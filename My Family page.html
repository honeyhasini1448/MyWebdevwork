<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY Family page</title>
    <style>
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url(https://plus.unsplash.com/premium_photo-1721979418259-b32d7de74637?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTd8fGRlc2VydHxlbnwwfHwwfHx8MA%3D%3D);

         }

        }
        p{

        }
        .family{
            display: flex;
            justify-content: center;
            gap: 30px;

            padding:20px;

        }
        .single{
            width: 250px;
            height: 350px;
            border: solid saddlebrown 3px;

            text-align: center;

        }
        .single:hover{
            background-color: rgba(0,0,0,0.2);
            transform: scale(1.1);
        }
        h3{
            border: 2px solid saddlebrown;
            border-radius: 20px;
        }
        button:hover{
            background-color:rgb(234, 161, 51);
            padding: 5px;
            border: burlywood solid 2px ;
            border-radius: 10px;
        }
        button{
            padding: 5px;
            border: saddlebrown solid 2px;
            color:black;
            border-radius: 5px;
        }
        img{
            border: solid burlywood 2px;
            border-radius: 50px;
            
        }

    </style>
</head>
