<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH Store</title>
    <style>
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding:40px;
        }
        h3{
            text-align: center;
            margin-bottom: 20px;
            color: darkslategrey;
            font-weight: bold;
        }
        .product{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap: 50px;
        }
        .item{
            text-align: center;
            border-radius: 20px;
            overflow: hidden;
            box-shadow:0 4px 8px ;

        }
        .item img{
            height: 200;
            width:100% ;
            object-fit: cover;

        }
        .item p{
            color: #777;
            font-size: 15px;
        }
        .click{
            background-color: green;
            border: none;
            border-radius: 5px;
            color: cornsilk;
            padding: 10px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .item:hover{
            transform: scale(1.04);
        }
        form{
            
        }
    </style>
</head>
<body>
    <header>
        <h1 style="text-align: center;font-style: italic;">CH store</h1>
        <nav>
           <form>
            <label for="search">search here:</label>
            <input type="text" placeholder="🔍search here whatever you want" id="search"> </form>
            <h2>Shop Now</h2>
        </nav>
    </header>
    <main>
    <div class="product">
        <div class="item">
            <img src="https://images.unsplash.com/photo-1552422535-c45813c61732?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fHBpYW5vfGVufDB8fDB8fHww">
            <h3>Piano</h3>
            <p>$100</p>
            <button class="click">Buy Now</button>
        </div>
        <div class="item">
            <img src="https://images.unsplash.com/photo-1495707902641-75cac588d2e9?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTF8fGNhbWVyYXxlbnwwfHwwfHx8MA%3D%3D">
            <h3>Camera</h3>
            <p>$100</p>
            <button class="click">Buy Now</button>
        </div>
        <div class="item">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8aGVhZHBob25lc3xlbnwwfHwwfHx8MA%3D%3D">
            <h3>Headphones</h3>
            <p>$120</p>
            <button class="click">Buy Now</button>
        </div>
        <div class="item">
            <img src="https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
            <h3>Iphone</h3>
            <p>$250</p>
            <button class="click">Buy Now</button>
        </div>
         <div class="item">
            <img src="https://images.unsplash.com/photo-1731320965914-a00cddeb32c1?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MzV8fGhhcnJ5JTIwcG90dGVyJTIwYm9va3MlMjBwaWN8ZW58MHx8MHx8fDA%3D">
            <h3>HarryPotter Books</h3>
            <p>$50</p>
            <button class="click">Buy Now</button>
        </div>
    </div>
    </main>
</body>
</html>
